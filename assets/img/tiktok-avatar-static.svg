<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Static Version for PNG Conversion -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGradient)" stroke="#1e293b" stroke-width="4"/>

  <!-- Static Glow Aura -->
  <circle cx="256" cy="256" r="185" stroke="#00c8ff" stroke-width="2" opacity="0.2" fill="none" />

  <!-- Stylized Glasses Frame -->
  <g filter="url(#glow)">
    <path d="M120 256 C120 210 160 180 200 180 L230 180 C245 180 250 190 256 200 C262 190 267 180 282 180 L312 180 C352 180 392 210 392 256 C392 302 352 332 312 332 L282 332 C267 332 262 322 256 312 C250 322 245 332 230 332 L200 332 C160 332 120 302 120 256 Z" 
          stroke="url(#glassGradient)" stroke-width="14" fill="none" stroke-linecap="round"/>
    
    <!-- Lenses -->
    <circle cx="190" cy="256" r="38" fill="white" opacity="0.95" />
    <circle cx="322" cy="256" r="38" fill="white" opacity="0.95" />
    
    <!-- Static Scanning Line -->
    <rect x="150" y="245" width="212" height="3" fill="#00c8ff" opacity="0.6" />
  </g>

  <!-- Text Bottom -->
  <text x="50%" y="420" text-anchor="middle" fill="#8b9ab5" font-family="sans-serif" font-size="30" font-weight="bold" letter-spacing="4">ANDROID XR</text>
  <text x="50%" y="458" text-anchor="middle" fill="white" font-family="sans-serif" font-size="26" font-weight="bold" letter-spacing="2">GLASSES.COM</text>
</svg>
